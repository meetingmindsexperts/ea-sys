# Fail2Ban filter — EA-SYS nginx rate-limit rejections.
#
# Matches the lines nginx writes to error.log when the ea_req / ea_conn
# rate-limit zones (see deploy/nginx.conf) reject a request or connection:
#
#   2026/06/10 13:00:00 [error] 1234#1234: *567 limiting requests, excess: 200.000 by zone "ea_req", client: 203.0.113.9, server: events.meetingmindsgroup.com, ...
#   2026/06/10 13:00:00 [error] 1234#1234: *567 limiting connections by zone "ea_conn", client: 203.0.113.9, server: ...
#
# Unanchored on the left (robust to the date/[error]/connection-id prefix) but
# pinned on the right (`, server:`) so <HOST> only ever captures the client IP.

[Definition]

failregex = limiting requests, excess: [\d.]+ by zone "[^"]+", client: <HOST>, server:
            limiting connections by zone "[^"]+", client: <HOST>, server:

ignoreregex =

# nginx error-log date (2026/06/10 13:00:00) is auto-detected by fail2ban.
