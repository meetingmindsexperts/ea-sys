# EA-SYS — ban IPs that REPEATEDLY trip the nginx rate limit (429).
#
# The nginx limit_req/limit_conn zones already throttle abusive traffic; this
# jail escalates: an IP that keeps hammering despite being throttled gets
# dropped at the firewall for a while, so it stops reaching the box entirely.
#
# ⚠ SHARED-NAT TUNING (important for EA-SYS): a ban blocks the whole IP, so a
#   false-positive bans an entire venue-WiFi. Thresholds are deliberately HIGH
#   and the window long, so a brief registration-rush overshoot from a shared
#   NAT (bursty, then subsides) does NOT trigger — only SUSTAINED abuse does.
#   Add your office / GitHub-runner / known-good IPs to `ignoreip`.
#
# Defaults below: ban an IP that gets 100+ requests rejected within 120s, for
# 30 min. A real flooder trips this in seconds; a legit NAT crowd won't.

[nginx-rate-limit]
enabled  = true
filter   = nginx-limit-req
# MUST override the box's global default (Debian/Ubuntu ships
# jail.d/defaults-debian.conf with `backend = systemd`). nginx writes to a
# FILE, not the journal, so without this the jail reads the journal, never
# sees the rate-limit lines, and never bans. `auto` = inotify→polling on the file.
backend  = auto
logpath  = /var/log/nginx/error.log
port     = http,https
maxretry = 100
findtime = 120
bantime  = 1800
# Never ban localhost. ADD trusted IPs here (office egress, monitors):
ignoreip = 127.0.0.1/8 ::1
# action/banaction inherit the global fail2ban default (same mechanism as the
# existing sshd jail). To ban via ufw instead, add: banaction = ufw
