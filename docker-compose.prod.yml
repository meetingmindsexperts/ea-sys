services:
  ea-sys-blue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ea-sys-blue
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3000
    ports:
      - "3000:3000"
    networks:
      - web
    volumes:
      # Shared uploads directory — both slots mount the same path
      - ./public/uploads:/app/public/uploads
      # Shared log directory for file-based log reading
      - ./logs:/app/logs
      # Docker socket (read-only) — allows docker inspect/logs but prevents container creation
      - /var/run/docker.sock:/var/run/docker.sock:ro
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
        tag: "{{.Name}}/{{.ID}}"

  ea-sys-green:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ea-sys-green
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3000
    ports:
      - "3001:3000"
    networks:
      - web
    volumes:
      - ./public/uploads:/app/public/uploads
      - ./logs:/app/logs
      - /var/run/docker.sock:/var/run/docker.sock:ro
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
        tag: "{{.Name}}/{{.ID}}"

  # ── Add future apps below this line ──────────────────────────────────────────
  # other-next-app:
  #   build:
  #     context: ../other-next-app
  #     dockerfile: Dockerfile
  #   container_name: other-next-app
  #   restart: unless-stopped
  #   env_file:
  #     - ../other-next-app/.env
  #   ports:
  #     - "3002:3000"
  #   networks:
  #     - web

networks:
  web:
    driver: bridge
