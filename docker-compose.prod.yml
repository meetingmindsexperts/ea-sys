services:
  ea-sys-blue:
    # Pre-built image from ECR (deploy.sh sets EA_SYS_WEB_IMAGE to :<sha>).
    # `build:` is kept as the on-box fallback: `docker compose build` still works
    # and tags the result as this image, so a deploy survives ECR being down.
    image: ${EA_SYS_WEB_IMAGE:-803726282629.dkr.ecr.ap-south-1.amazonaws.com/ea-sys:latest}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Only used on the on-box fallback build (ECR unreachable). The normal
        # path pulls an image CI already built WITH these baked in.
        GIT_SHA: ${IMAGE_TAG:-unknown}
    container_name: ea-sys-blue
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3000
      - EA_SYS_SLOT=blue
      - MEDIAMTX_HLS_URL=http://ea-sys-mediamtx:8888
    ports:
      - "3000:3000"
    # Cap: 2 GB heap (NODE_OPTIONS) + room for the runtime. Steady state ~230 MB.
    mem_limit: 2600m
    memswap_limit: 3600m
    healthcheck:
      # The blue/green slots had NO liveness probe — `restart: unless-stopped`
      # only restarts a container whose process EXITS, so a wedged-but-alive Node
      # (event-loop stall, pool exhaustion) was never recycled.
      test: ["CMD", "curl", "-fs", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    networks:
      - web
    volumes:
      # Shared uploads directory — both slots mount the same path
      - ./public/uploads:/app/public/uploads
      # Shared log directory for file-based log reading
      - ./logs:/app/logs
      # Docker socket — powers the "docker" source of the /logs viewer, which is
      # the only place you can see RAW container stdout (crash traces from before
      # the logger initialises, OOM kills, Next.js boot errors). file + database
      # sources cannot show those.
      #
      # ⚠ ACCEPTED RISK, deliberately. The `:ro` flag does NOT sandbox this: it
      # makes the socket FILE read-only, while the Docker API served over it stays
      # fully READ-WRITE. Anything that can reach this socket can create a
      # privileged container and become root on the host. (An earlier comment here
      # claimed :ro "prevents container creation" — it does not. Do not re-reason
      # from that.) Keep the SSRF surface tight — see downloadExternalPhoto, which
      # currently has no host allowlist. If this ever needs closing, the fix is a
      # docker-socket-proxy sidecar (read-only API), not the :ro flag.
      - /var/run/docker.sock:/var/run/docker.sock:ro
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
        tag: "{{.Name}}/{{.ID}}"

  ea-sys-green:
    image: ${EA_SYS_WEB_IMAGE:-803726282629.dkr.ecr.ap-south-1.amazonaws.com/ea-sys:latest}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        GIT_SHA: ${IMAGE_TAG:-unknown}
    container_name: ea-sys-green
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3000
      - EA_SYS_SLOT=green
      - MEDIAMTX_HLS_URL=http://ea-sys-mediamtx:8888
    ports:
      - "3001:3000"
    # Cap: 2 GB heap (NODE_OPTIONS) + room for the runtime. Steady state ~230 MB.
    mem_limit: 2600m
    memswap_limit: 3600m
    healthcheck:
      # The blue/green slots had NO liveness probe — `restart: unless-stopped`
      # only restarts a container whose process EXITS, so a wedged-but-alive Node
      # (event-loop stall, pool exhaustion) was never recycled.
      test: ["CMD", "curl", "-fs", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    networks:
      - web
    volumes:
      - ./public/uploads:/app/public/uploads
      - ./logs:/app/logs
      # See the note on ea-sys-blue: :ro does NOT restrict the Docker API.
      - /var/run/docker.sock:/var/run/docker.sock:ro
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
        tag: "{{.Name}}/{{.ID}}"

  # ── Background worker tier ───────────────────────────────────────────────────
  # Runs the 5 cron-driven jobs (cert renderer, scheduled emails, webinar
  # recordings + attendance, MCP OAuth cleanup) on a node-cron scheduler in
  # its own process. Sibling of the blue/green web containers; shares the
  # same .env, same uploads volume, same logs volume, same network so it
  # can reach Postgres through the same connection string. See
  # docs/WORKER_EXTRACTION_PLAN.md for the architecture.
  #
  # Phase 2 (dual-write window): both the legacy /api/cron/* routes AND
  # this worker run the same shared runTick() functions. Postgres advisory
  # locks (worker/lib/advisory-lock.ts) serialize them so we never
  # double-process a row.
  #
  # Healthcheck hits localhost:3099/health inside the container — no port
  # is published externally, the endpoint is for Docker only.
  ea-sys-worker:
    # Pre-built worker image from ECR (deploy.sh sets EA_SYS_WORKER_IMAGE to
    # :worker-<sha>). This image also runs `prisma migrate deploy` during deploy
    # (it ships the full node_modules incl. the Prisma CLI). `build:` kept as the
    # on-box fallback.
    image: ${EA_SYS_WORKER_IMAGE:-803726282629.dkr.ecr.ap-south-1.amazonaws.com/ea-sys:worker-latest}
    build:
      context: .
      dockerfile: Dockerfile.worker
      args:
        GIT_SHA: ${IMAGE_TAG:-unknown}
    container_name: ea-sys-worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - WORKER_HEALTH_PORT=3099
    # Same reasoning as the web slots. The worker renders PDFs and pulls Zoom
    # reports, so its peaks are spikier — but it must not be able to take the
    # host down with it.
    mem_limit: 2600m
    memswap_limit: 3600m
    networks:
      - web
    volumes:
      # Same uploads mount as the web containers — the cert renderer
      # reads template background PDFs from public/uploads/certificates/
      # and writes issued PDFs back to the same tree. The mount must
      # match the web containers exactly or PDFs end up in two
      # different "public/uploads/" directories that don't sync.
      - ./public/uploads:/app/public/uploads
      # Shared log directory so the file logger has a writable target
      # AND the existing /logs viewer can read worker output.
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:3099/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
        tag: "{{.Name}}/{{.ID}}"

  # ── RTMP → HLS live streaming server ─────────────────────────────────────────
  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: ea-sys-mediamtx
    restart: unless-stopped
    ports:
      - "1935:1935"    # RTMP ingest (Zoom pushes here)
      - "8888:8888"    # HLS output (nginx proxies /stream/ to here)
      - "8889:8889"    # WebRTC (future low-latency option)
    # Idles at ~11 MB; a live stream is the only thing that moves it. Capped so a
    # misbehaving ingest can't compete with the app for host memory.
    mem_limit: 512m
    volumes:
      - ./mediamtx.yml:/mediamtx.yml
    networks:
      - web
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

networks:
  web:
    driver: bridge
