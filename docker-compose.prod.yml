services:
  ea-sys-blue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ea-sys-blue
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3000
      - MEDIAMTX_HLS_URL=http://ea-sys-mediamtx:8888
    ports:
      - "3000:3000"
    networks:
      - web
    volumes:
      # Shared uploads directory — both slots mount the same path
      - ./public/uploads:/app/public/uploads
      # Shared log directory for file-based log reading
      - ./logs:/app/logs
      # Docker socket (read-only) — allows docker inspect/logs but prevents container creation
      - /var/run/docker.sock:/var/run/docker.sock:ro
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
        tag: "{{.Name}}/{{.ID}}"

  ea-sys-green:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ea-sys-green
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3000
      - MEDIAMTX_HLS_URL=http://ea-sys-mediamtx:8888
    ports:
      - "3001:3000"
    networks:
      - web
    volumes:
      - ./public/uploads:/app/public/uploads
      - ./logs:/app/logs
      - /var/run/docker.sock:/var/run/docker.sock:ro
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
        tag: "{{.Name}}/{{.ID}}"

  # ── RTMP → HLS live streaming server ─────────────────────────────────────────
  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: ea-sys-mediamtx
    restart: unless-stopped
    ports:
      - "1935:1935"    # RTMP ingest (Zoom pushes here)
      - "8888:8888"    # HLS output (nginx proxies /stream/ to here)
      - "8889:8889"    # WebRTC (future low-latency option)
    volumes:
      - ./mediamtx.yml:/mediamtx.yml
    networks:
      - web
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

networks:
  web:
    driver: bridge
