# MediaMTX configuration for EA-SYS live streaming
# RTMP ingest from Zoom → HLS output for browser playback

hlsAddress: :8888
rtmpAddress: :1935
webrtcAddress: :8889

# HLS settings — mpegts variant (fmp4 has known 404 issues)
hlsVariant: mpegts
hlsSegmentCount: 7
hlsSegmentDuration: 2s
hlsSegmentMaxSize: 50M
hlsAlwaysRemux: true

# Allow all paths
paths:
  all:
    source: publisher
