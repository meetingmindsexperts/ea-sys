version: 2

updates:
  # npm — 82 production deps including the Zoom SDK, sharp, pdf/canvas libs.
  # `npm audit` reports 10 high-severity advisories as of July 2026 and nothing
  # was grinding them down, because nothing was watching.
  #
  # Grouped so this produces ~2 PRs a week, not 30. Minor+patch bumps are
  # batched; majors come as individual PRs because they need a real look.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "04:00"
      timezone: Asia/Dubai
    open-pull-requests-limit: 5
    groups:
      production-minor-patch:
        dependency-type: production
        update-types: [minor, patch]
      dev-minor-patch:
        dependency-type: development
        update-types: [minor, patch]
    ignore:
      # Majors of the framework spine land as deliberate, planned upgrades —
      # not as a Monday-morning PR. Dependabot still reports their security
      # advisories; it just won't open a "Next 17" PR at us.
      - dependency-name: next
        update-types: [version-update:semver-major]
      - dependency-name: react
        update-types: [version-update:semver-major]
      - dependency-name: react-dom
        update-types: [version-update:semver-major]
      - dependency-name: "@prisma/client"
        update-types: [version-update:semver-major]
      - dependency-name: prisma
        update-types: [version-update:semver-major]
      # Zoom's SDK is version-pinned against a specific React runtime and the
      # loader path (CDN vs npm) is wired to it — a surprise bump breaks the
      # webinar embed. See CLAUDE.md, June 23 2026.
      - dependency-name: "@zoom/meetingsdk"

  # Pin/refresh the actions themselves — a stale action is a supply-chain risk
  # nobody looks at.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
