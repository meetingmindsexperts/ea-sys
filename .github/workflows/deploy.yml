name: Deploy to EC2

on:
  push:
    branches:
      - main
    # Docs-only pushes must NOT trigger a deploy — the deploy builds the image
    # ON the box, and an on-box build can starve/freeze the host (see INC-001).
    # A commit that touches any code still deploys; pure docs/markdown don't.
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  # ── CI phase: THREE PARALLEL JOBS (split July 22, 2026, owner decision) ─────
  # The old single `ci` job ran lint → tests → guards → build serially on one
  # runner (~5-6 min). checks/tests/build are independent, so they run
  # concurrently — the CI phase's wall clock becomes max(build ≈ 3-4 min),
  # saving ~2-2.5 min per deploy. Every gate that blocked build-push before
  # still blocks it (needs: [checks, tests, build]). Trade-off accepted:
  # each job pays its own ~40s checkout+node+cache setup (a few extra billed
  # runner-minutes, no wall-clock cost) and a broken commit burns minutes in
  # all three jobs instead of failing fast in one. All jobs run on
  # GitHub-hosted runners — the EC2 box is only touched by `deploy`.

  checks:
    name: Lint · types · guards
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc

      # Cache the full node_modules dir keyed on lockfile.
      # On hit, npm ci is skipped entirely (~30-40s saved).
      - name: Cache dependencies
        id: deps-cache
        uses: actions/cache@v5
        with:
          path: node_modules
          key: deps-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.deps-cache.outputs.cache-hit != 'true'
        run: npm ci

      # Catch the drift CASE we hit twice already: a contributor on a different
      # Node/npm version commits a lockfile that npm 10 cannot consume. Re-resolve
      # under THIS runner's npm and fail loudly if the result differs.
      - name: Verify lockfile is in sync
        run: |
          npm install --package-lock-only --no-audit --no-fund
          if ! git diff --exit-code package-lock.json; then
            echo "::error::package-lock.json is out of sync with package.json. Run 'npm install' under Node $(node --version) and commit the result."
            exit 1
          fi

      # Always run prisma generate — on cache miss it ran via postinstall,
      # but on cache hit postinstall was skipped. This is fast (~3s).
      - name: Generate Prisma client
        run: npx prisma generate

      # Run type-check in background, lint in foreground, then collect both.
      # Both are independent — saves ~15-20s vs running sequentially.
      - name: Type check & Lint
        run: |
          npm run type-check &
          npm run lint
          wait

      # Blue-green migrates BEFORE the nginx swap, so a DROP/RENAME/SET NOT NULL
      # breaks the old slot while it is still serving real users — and a code
      # rollback re-runs `migrate deploy` and cannot undo it. See the script's
      # header for the expand/contract escape hatch.
      - name: Migration safety (blue-green)
        run: bash scripts/check-migration-safety.sh

      # Event.slug is only unique PER ORG — a public route that hand-rolls a
      # slug lookup instead of publicEventWhere reopens the cross-tenant hole
      # the Phase-0 sweep closed. Gating: only fires on new code in the
      # public surface, so it can't block an unrelated hotfix.
      - name: Tenant scoping (public event lookups)
        run: bash scripts/check-tenant-scoping.sh

      # Dependency auditing is done manually, locally, before a push — not in CI.
      # (`npm audit` on demand.) Deliberate: CI gates what a commit BREAKS, not
      # what the ecosystem happens to have disclosed today, which is not something
      # a deploy should be blocked on.

  tests:
    name: Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc

      - name: Cache dependencies
        id: deps-cache
        uses: actions/cache@v5
        with:
          path: node_modules
          key: deps-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.deps-cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      # The unit suite (3600+ tests) runs in seconds and covers the invariants
      # we most need protected on a live system — RBAC, finance visibility,
      # barcode visibility, seat accounting, the worker-job drift guard.
      - name: Unit tests
        run: npm test

  build:
    name: Build (gating)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc

      - name: Cache dependencies
        id: deps-cache
        uses: actions/cache@v5
        with:
          path: node_modules
          key: deps-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.deps-cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      # Gating build (restored by owner request, July 16, 2026): fail fast on
      # any build error before images are built or anything deploys. No Sentry
      # token here — the source-map upload lives in the PARALLEL, non-gating
      # `sourcemaps` job below.
      - name: Build
        run: npx next build

  # ── Tenant-isolation harness (parallel, NON-GATING initially) ────────────────
  # Real Postgres + pgbouncer (transaction mode) service containers running the
  # tests/tenancy suite: two seeded tenants + the pilot Event RLS policy prove
  # host→org resolution, the SET LOCAL transport, and cross-tenant isolation
  # (docs/MULTI_TENANCY.md §0 Phase 0). Deliberately NOT in the deploy path
  # yet — fresh container infra on the pipeline that deploys a live event
  # platform must not be able to block an emergency hotfix. Promote to gating
  # (add to build-push's `needs`) after ≥5 consecutive green runs.
  tenancy:
    name: Tenant isolation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: tenancy
        ports:
          - 55432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      pgbouncer:
        image: edoburu/pgbouncer:latest
        env:
          DB_HOST: postgres
          DB_NAME: tenancy
          DB_USER: app_user
          DB_PASSWORD: app_user_pw
          POOL_MODE: transaction
          AUTH_TYPE: plain
          MAX_CLIENT_CONN: "100"
        ports:
          - 56432:5432
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc

      - name: Cache dependencies
        id: tenancy-deps-cache
        uses: actions/cache@v5
        with:
          path: node_modules
          key: deps-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.tenancy-deps-cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Tenant-isolation suite
        env:
          TENANCY_DIRECT_URL: postgresql://postgres:postgres@localhost:55432/tenancy
          TENANCY_DATABASE_URL: postgresql://app_user:app_user_pw@localhost:56432/tenancy?pgbouncer=true&connection_limit=3
        run: npm run test:tenancy

  # ── Sentry source maps (parallel, non-gating) ────────────────────────────────
  # Runs `next build` with the Sentry auth token purely to upload source maps
  # for this commit — the Docker image build deliberately has NO Sentry token,
  # so without this job client stack traces in Sentry are minified. It runs in
  # parallel with build-push and NOTHING depends on it, so it adds zero deploy
  # latency; a failure here shows red in the Actions tab but neither blocks the
  # deploy nor fires the deploy-failed page (that alert says "the box may be
  # half-deployed", which would be false for a map-upload hiccup).
  sourcemaps:
    name: Sentry source maps
    # Gated on the cheap checks job only (was: the whole serial ci) — starts
    # ~3 min earlier while still not wasting a Sentry build on a broken commit.
    needs: checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc

      - name: Cache dependencies
        id: deps-cache
        uses: actions/cache@v5
        with:
          path: node_modules
          key: deps-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.deps-cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build + upload source maps
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        run: npx next build

  # ── Build + push images to ECR ───────────────────────────────────────────────
  # Builds the web (Dockerfile) + worker (Dockerfile.worker) images on GitHub's
  # fast runners and pushes them to ECR (ap-south-1). Auth is via GitHub OIDC —
  # NO stored AWS keys. The deploy job depends on this (Step 2): the box pulls
  # these images instead of building on-box (~8 min → ~1-2 min).
  #
  # PARALLEL MATRIX (July 22, 2026, owner decision): the two images used to
  # build serially in one job (~247s web + ~119s worker = ~6.6 min); they are
  # independent, so each matrix leg builds one image and the phase's wall
  # clock is max(web) ≈ 4 min — ~2.5 min saved per deploy. Cache scopes
  # (web/worker) are unchanged, so existing GHA layer caches carry over.
  # `needs: build-push` on deploy waits for BOTH legs, exactly as before.
  build-push:
    name: Build & push ${{ matrix.image }} image → ECR
    # Every gate the old serial `ci` job enforced still blocks image builds.
    needs: [checks, tests, build]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      # Let the other image finish (its push is harmless — deploy won't run on
      # any failure) so a red run shows exactly which image broke.
      fail-fast: false
      matrix:
        include:
          - image: web
            dockerfile: Dockerfile
            tag_prefix: ""
          - image: worker
            dockerfile: Dockerfile.worker
            tag_prefix: "worker-"
    permissions:
      id-token: write   # required for GitHub OIDC → AWS role assumption
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Configure AWS credentials (OIDC — no stored keys)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::803726282629:role/ea-sys-gha-ecr-push
          aws-region: ap-south-1

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Stamp the ACTUAL build time. `github.event.repository.updated_at` looks
      # like a build timestamp and isn't — it's when the repo record was last
      # touched, so it reports "today" for an image built last week (i.e. it lies
      # in exactly the situation this field exists for: a rollback), and it can be
      # empty on workflow_dispatch. Compute it here instead.
      - name: Compute build metadata
        id: meta
        run: echo "built_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Build & push ${{ matrix.image }} image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            803726282629.dkr.ecr.ap-south-1.amazonaws.com/ea-sys:${{ matrix.tag_prefix }}${{ github.sha }}
            803726282629.dkr.ecr.ap-south-1.amazonaws.com/ea-sys:${{ matrix.tag_prefix }}latest
          # Bake the commit into the image so /api/health, /admin/infra and every
          # alert email can answer "what SHA is running?" — previously unanswerable.
          build-args: |
            GIT_SHA=${{ github.sha }}
            BUILT_AT=${{ steps.meta.outputs.built_at }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
          # Don't push provenance/SBOM attestation manifests — buildx defaults to
          # provenance:true, which adds an extra untagged manifest per build that
          # nothing here pulls and just clutters ECR.
          provenance: false
          sbom: false

  # ── Deploy to Mumbai (ap-south-1) ──────────────────────────────────────────
  # Depends on build-push so the ECR images for THIS commit exist before we
  # deploy. The box pulls those images (scripts/deploy.sh, keyed on IMAGE_TAG =
  # the git SHA) instead of building on-box. If the pull ever fails, deploy.sh
  # falls back to an on-box build, so a deploy never hard-fails on ECR.
  deploy:
    name: Deploy → Mumbai (ap-south-1)
    needs: build-push
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.MUMBAI_EC2_HOST }}
          username: ${{ secrets.MUMBAI_EC2_USER }}
          key: ${{ secrets.MUMBAI_EC2_SSH_KEY }}
          port: 22
          script_stop: true
          command_timeout: 25m
          # IMAGE_TAG pins the exact images CI just pushed for this commit.
          envs: IMAGE_TAG
          script: |
            set -e
            cd /home/ubuntu/ea-sys

            echo "==> Fixing upload dir ownership for git reset"
            sudo chown -R ubuntu:ubuntu /home/ubuntu/ea-sys/public/uploads /home/ubuntu/ea-sys/logs

            # Check out the EXACT commit whose images we're about to deploy —
            # not whatever origin/main happens to be right now.
            #
            # This used to be `git reset --hard origin/main` while IMAGE_TAG is
            # pinned to github.sha. Those are the same thing on a normal push,
            # but they diverge on the one action you take under pressure:
            # re-running an older workflow run. That gave the box CURRENT main's
            # docker-compose.prod.yml, deploy.sh and prisma/migrations/, and then
            # deployed an OLD image against them — and ran the NEW migrations from
            # the OLD worker image. Code and image must always be the same commit.
            echo "==> Checking out deploy commit ($IMAGE_TAG)"
            git fetch origin
            if ! git cat-file -e "${IMAGE_TAG}^{commit}" 2>/dev/null; then
              echo "✗ Commit $IMAGE_TAG not found on the box after fetch. Aborting."
              exit 1
            fi
            git reset --hard "$IMAGE_TAG"

            echo "==> Running blue-green deploy (IMAGE_TAG=$IMAGE_TAG)"
            bash scripts/deploy.sh
        env:
          IMAGE_TAG: ${{ github.sha }}

  # ── Page a human when the pipeline fails ────────────────────────────────────
  # Until now a failed deploy notified NOBODY. appleboy/ssh-action runs with
  # script_stop: true, so deploy.sh can halt part-way through — after migrations
  # have run, possibly after the new slot is up but before nginx switched — and
  # the only signal was a red ✗ in the Actions tab that nobody is watching at 3am.
  #
  # The email is sent FROM THE BOX (scripts/ops-alert.sh) because the EC2 instance
  # role already has ses:SendEmail — doing it from the runner would need new IAM.
  # The trade-off: if the box itself is unreachable (the fail2ban-bans-the-runner
  # case, see docs/INCIDENTS.md), this job can't send either. That's a known and
  # accepted hole; the durable fix is OIDC + an ses:SendEmail policy on the
  # ea-sys-gha role, which is an AWS change to make deliberately.
  notify-failure:
    name: Alert on failure
    needs: [checks, tests, build, build-push, deploy]
    if: failure()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Send SES alert
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.MUMBAI_EC2_HOST }}
          username: ${{ secrets.MUMBAI_EC2_USER }}
          key: ${{ secrets.MUMBAI_EC2_SSH_KEY }}
          port: 22
          command_timeout: 3m
          envs: RUN_URL,SHA,ACTOR,BRANCH
          script: |
            cd /home/ubuntu/ea-sys

            # First failure after this change ships, the script may not be on the
            # box yet (the deploy that would have delivered it is the one that
            # failed). Pull just that file.
            if [ ! -f scripts/ops-alert.sh ]; then
              git fetch origin main --quiet || true
              git checkout origin/main -- scripts/ops-alert.sh || true
            fi

            SUBJECT="EA-SYS DEPLOY FAILED — ${SHA:0:7} (${BRANCH})"
            BODY="A deploy to production FAILED.

            Commit : ${SHA}
            Branch : ${BRANCH}
            By     : ${ACTOR}
            Run    : ${RUN_URL}

            The box may be HALF-DEPLOYED. deploy.sh can stop part-way, and
            migrations run BEFORE the nginx swap — so the new schema may already
            be live while the old code still serves traffic.

            Check what is actually running (the newest commit in git log is NOT
            necessarily what is serving):
              ssh the box, then:  docker ps
              active slot:        cat /home/ubuntu/.active-slot
              health:             curl -s localhost/api/health

            To roll back to a known-good image:
              IMAGE_TAG=<previous-full-40-char-sha> bash scripts/deploy.sh
            Full runbook: docs/ROLLBACK.md"

            if [ -f scripts/ops-alert.sh ]; then
              bash scripts/ops-alert.sh "$SUBJECT" "$BODY"
            else
              echo "✗ ops-alert.sh missing on the box — could not send alert" >&2
              exit 1
            fi
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
          BRANCH: ${{ github.ref_name }}
