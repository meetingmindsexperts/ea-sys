name: Deploy to EC2

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --include=optional

      - name: Verify lightningcss binding
        run: |
          node -e "
          try {
            require('lightningcss');
            console.log('✅ lightningcss native binding loaded successfully');
          } catch (e) {
            console.error('❌ lightningcss binding failed to load');
            console.error(e.message);
            process.exit(1);
          }
          "

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script_stop: true
          command_timeout: 15m
          script: |
            set -e
            cd /home/ubuntu/ea-sys

            echo "==> Pulling latest code"
            git fetch origin main
            git reset --hard origin/main

            echo "==> Running blue-green deploy"
            bash scripts/deploy.sh
