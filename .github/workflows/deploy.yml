name: Deploy to EC2

on:
  push:
    branches:
      - main
    # Docs-only pushes must NOT trigger a deploy — the deploy builds the image
    # ON the box, and an on-box build can starve/freeze the host (see INC-001).
    # A commit that touches any code still deploys; pure docs/markdown don't.
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  # ── CI: Lint, type-check, build (runs once) ──────────────────────────────────
  ci:
    name: CI
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc

      # Cache the full node_modules dir keyed on lockfile.
      # On hit, npm ci is skipped entirely (~30-40s saved).
      - name: Cache dependencies
        id: deps-cache
        uses: actions/cache@v5
        with:
          path: node_modules
          key: deps-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.deps-cache.outputs.cache-hit != 'true'
        run: npm ci

      # Catch the drift CASE we hit twice already: a contributor on a different
      # Node/npm version commits a lockfile that npm 10 cannot consume. Re-resolve
      # under THIS runner's npm and fail loudly if the result differs.
      - name: Verify lockfile is in sync
        run: |
          npm install --package-lock-only --no-audit --no-fund
          if ! git diff --exit-code package-lock.json; then
            echo "::error::package-lock.json is out of sync with package.json. Run 'npm install' under Node $(node --version) and commit the result."
            exit 1
          fi

      # Always run prisma generate — on cache miss it ran via postinstall,
      # but on cache hit postinstall was skipped. This is fast (~3s).
      - name: Generate Prisma client
        run: npx prisma generate

      # Run type-check in background, lint in foreground, then collect both.
      # Both are independent — saves ~15-20s vs running sequentially.
      - name: Type check & Lint
        run: |
          npm run type-check &
          npm run lint
          wait

      # `next build` here uploads source maps to Sentry (has the auth token) AND
      # fails fast on any build error before we bother building the Docker image.
      # The build-push job below builds the runtime image separately; source maps
      # continue to come from THIS step (the Docker build has no Sentry token).
      - name: Build
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        run: npx next build

  # ── Build + push images to ECR (Step 1 of the ECR migration) ─────────────────
  # Builds the web (Dockerfile) + worker (Dockerfile.worker) images on GitHub's
  # fast runners and pushes them to ECR (ap-south-1). Auth is via GitHub OIDC —
  # NO stored AWS keys. This job is INDEPENDENT of the deploy job for now (deploy
  # still builds on the box) so populating ECR carries zero risk to deploys.
  # Step 2 will point the box's deploy.sh at these images and drop the on-box build.
  build-push:
    name: Build & push images → ECR
    needs: ci
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      id-token: write   # required for GitHub OIDC → AWS role assumption
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Configure AWS credentials (OIDC — no stored keys)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::803726282629:role/ea-sys-gha-ecr-push
          aws-region: ap-south-1

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push WEB image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            803726282629.dkr.ecr.ap-south-1.amazonaws.com/ea-sys:${{ github.sha }}
            803726282629.dkr.ecr.ap-south-1.amazonaws.com/ea-sys:latest
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

      - name: Build & push WORKER image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.worker
          push: true
          tags: |
            803726282629.dkr.ecr.ap-south-1.amazonaws.com/ea-sys:worker-${{ github.sha }}
            803726282629.dkr.ecr.ap-south-1.amazonaws.com/ea-sys:worker-latest
          cache-from: type=gha,scope=worker
          cache-to: type=gha,mode=max,scope=worker

  # ── Deploy to Mumbai (ap-south-1) ──────────────────────────────────────────
  # STEP 1: unchanged — still builds on the box via scripts/deploy.sh. Depends
  # only on `ci`, so a build-push failure does NOT block a deploy while we
  # validate the ECR path. Step 2 will switch this to `needs: build-push` and a
  # pull-based deploy.
  deploy:
    name: Deploy → Mumbai (ap-south-1)
    needs: ci
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.MUMBAI_EC2_HOST }}
          username: ${{ secrets.MUMBAI_EC2_USER }}
          key: ${{ secrets.MUMBAI_EC2_SSH_KEY }}
          port: 22
          script_stop: true
          command_timeout: 25m
          script: |
            set -e
            cd /home/ubuntu/ea-sys

            echo "==> Fixing upload dir ownership for git reset"
            sudo chown -R ubuntu:ubuntu /home/ubuntu/ea-sys/public/uploads /home/ubuntu/ea-sys/logs

            echo "==> Pulling latest code"
            git fetch origin main
            git reset --hard origin/main

            echo "==> Running blue-green deploy"
            bash scripts/deploy.sh
