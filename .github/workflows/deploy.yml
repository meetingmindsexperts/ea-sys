name: Deploy to EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  # ── CI: Lint, type-check, build (runs once) ──────────────────────────────────
  ci:
    name: CI
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Build
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        run: npm run build

  # ── Deploy to Mumbai (ap-south-1) ──────────────────────────────────────────
  deploy:
    name: Deploy → Mumbai (ap-south-1)
    needs: ci
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.MUMBAI_EC2_HOST }}
          username: ${{ secrets.MUMBAI_EC2_USER }}
          key: ${{ secrets.MUMBAI_EC2_SSH_KEY }}
          port: 22
          script_stop: true
          command_timeout: 25m
          script: |
            set -e
            cd /home/ubuntu/ea-sys

            echo "==> Pulling latest code"
            git fetch origin main
            git reset --hard origin/main

            echo "==> Running blue-green deploy"
            bash scripts/deploy.sh
