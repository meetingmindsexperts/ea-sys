# ─────────────────────────────────────────────────────────────────────────────
# LIVE nginx config snapshot — captured from the production box
# (/etc/nginx/sites-available/ea-sys) on 2026-06-30 via read-only SSM.
#
# WHY THIS FILE EXISTS: the box is the source of truth for nginx (Certbot edits
# this file directly), and it has DIVERGED from the intended config in
# `deploy/nginx.conf`. This is a faithful DR snapshot of what is ACTUALLY running,
# so the box can be rebuilt exactly. It is NOT applied by any tooling — it's a
# backup/reference only.
#
# DIVERGENCE (this live file is a LEANER subset of deploy/nginx.conf). The live
# box is MISSING, vs the intended deploy/nginx.conf:
#   - HTTP/2            (live is `listen 443 ssl`, no `http2`)              ← real perf gap
#   - Security headers  (X-Frame-Options / X-Content-Type-Options / Referrer-Policy)
#   - gzip block        (Next.js compresses responses itself, so low impact)
#   - /_next/static/ immutable caching (Next sets these headers itself → redundant)
#   - /_next/image, agent-SSE location, dotfile-deny, proxy buffer tuning
#     (agent SSE works anyway — the route sends `X-Accel-Buffering: no`)
#
# To reconcile: either (a) targeted edits on the box to add `http2 on;` + the
# security headers (preferred — Certbot manages this file, so DON'T wholesale-
# replace it), or (b) accept the lean config and treat deploy/nginx.conf as
# aspirational. See infra/dr / the DR runbooks.
#
# The blue-green upstream block lives separately in
# /etc/nginx/conf.d/ea-sys-upstream.conf and is REGENERATED by scripts/deploy.sh
# on every deploy (it just points at the active slot's port) — not backed up here
# because it's recreated automatically. At capture time it was:
#     upstream ea_sys_app { server 127.0.0.1:3000; keepalive 32; }
# ─────────────────────────────────────────────────────────────────────────────

# ── Rate limiting (origin directly exposed, no CDN — $remote_addr is the real
#    client IP). Crude-flood backstop; tuned to tolerate shared-NAT event
#    crowds. Raise limit_conn / rate for very large on-site audiences. ───────
limit_req_zone  $binary_remote_addr zone=ea_req:10m  rate=100r/s;
limit_conn_zone $binary_remote_addr zone=ea_conn:10m;
limit_req_status   429;
limit_conn_status  429;
limit_req_log_level warn;

server {
    server_name events.meetingmindsgroup.com;

    # Concurrent connections per IP (shared-NAT-tolerant; raise for big venues).
    limit_conn ea_conn 100;

    # MCP endpoint — disable gzip + buffering for SSE streaming
    location /api/mcp {
        limit_req zone=ea_req burst=50 nodelay;

        proxy_pass         http://ea_sys_app;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        gzip               off;
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        chunked_transfer_encoding on;
    }

    location / {
        limit_req zone=ea_req burst=200 nodelay;

        proxy_pass         http://ea_sys_app;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Live HLS stream — intentionally NOT rate-limited (players poll segments).
    location /stream/ {
        proxy_pass http://localhost:8888/;
        proxy_http_version 1.1;
        add_header Cache-Control "no-cache";
        add_header Access-Control-Allow-Origin *;
    }

    client_max_body_size 10M;

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/events.meetingmindsgroup.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/events.meetingmindsgroup.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = events.meetingmindsgroup.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name events.meetingmindsgroup.com;
    return 404; # managed by Certbot
}
