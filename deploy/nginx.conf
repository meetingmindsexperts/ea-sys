# /etc/nginx/sites-available/ea-sys
# Domain: events.meetingmindsgroup.com
#
# Blue-green: the active upstream is controlled by /etc/nginx/conf.d/ea-sys-upstream.conf
# The deploy script rewrites that file with a complete "upstream ea_sys_app { ... }" block
# and does `nginx -s reload` (graceful — in-flight requests finish first).
# The upstream block lives in conf.d/ so nginx's http-level include picks it up cleanly.

server {
    listen 80;
    server_name events.meetingmindsgroup.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name events.meetingmindsgroup.com;

    # SSL — managed by Certbot
    ssl_certificate     /etc/letsencrypt/live/events.meetingmindsgroup.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/events.meetingmindsgroup.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options        "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml;

    # Next.js static assets — long cache
    location /_next/static/ {
        proxy_pass http://ea_sys_app;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location /_next/image {
        proxy_pass http://ea_sys_app;
    }

    # MCP endpoint — disable gzip + buffering for SSE streaming.
    # Also matches /api/mcp/oauth/* (token/register/revoke/authorize-decision)
    # and inherits the same SSE-friendly proxy config, which is harmless for
    # plain JSON responses.
    location /api/mcp {
        proxy_pass         http://ea_sys_app;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_set_header   Connection        "";

        # Critical for MCP/SSE — disable all buffering and compression
        gzip               off;
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        chunked_transfer_encoding on;
    }

    # Agent SSE endpoint — same treatment
    location ~ /api/events/.*/agent/execute {
        proxy_pass         http://ea_sys_app;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        gzip               off;
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Main app
    location / {
        proxy_pass         http://ea_sys_app;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        proxy_buffer_size  16k;
        proxy_buffers      4 32k;
    }

    location ~ /\. { deny all; }
    client_max_body_size 10M;
}

