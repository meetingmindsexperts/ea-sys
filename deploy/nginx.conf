# /etc/nginx/sites-available/ea-sys
# Replace YOUR_DOMAIN with your actual domain (e.g. events.meetingmindsgroup.com)
#
# Blue-green: the active port is controlled by /etc/nginx/conf.d/ea-sys-upstream.conf
# The deploy script writes "server 127.0.0.1:3000;" or "server 127.0.0.1:3001;" to
# that file and does `nginx -s reload` (graceful — in-flight requests finish first).

upstream ea_sys_app {
    include /etc/nginx/conf.d/ea-sys-upstream.conf;
    keepalive 32;
}

server {
    listen 80;
    server_name YOUR_DOMAIN;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name YOUR_DOMAIN;

    # SSL — managed by Certbot
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options        "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml;

    # Next.js static assets — long cache
    location /_next/static/ {
        proxy_pass http://ea_sys_app;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location /_next/image {
        proxy_pass http://ea_sys_app;
    }

    # Main app
    location / {
        proxy_pass         http://ea_sys_app;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        proxy_buffer_size  16k;
        proxy_buffers      4 32k;
    }

    location ~ /\. { deny all; }
    client_max_body_size 10M;
}

