# /etc/nginx/sites-available/ea-sys
# Domain: events.meetingmindsgroup.com
#
# Blue-green: the active upstream is controlled by /etc/nginx/conf.d/ea-sys-upstream.conf
# The deploy script rewrites that file with a complete "upstream ea_sys_app { ... }" block
# and does `nginx -s reload` (graceful — in-flight requests finish first).
# The upstream block lives in conf.d/ so nginx's http-level include picks it up cleanly.

# ── Rate limiting ─────────────────────────────────────────────────────────────
# Origin is directly exposed (no CDN/proxy in front), so $remote_addr IS the
# real client IP — a safe, un-spoofable key (the TCP source). These zones live
# in http context (this file is included via sites-enabled inside http{}).
#
# Goal: blunt single-IP floods/bots before they reach Node, and survive app
# restarts (the in-app limiter is in-memory + per-container). Limits are set
# WELL above real human/browser bursts so legitimate dashboard use never trips
# them — they only catch abusive request/connection rates.
#
#   ea_req  — 50 req/s/IP sustained, burst 100 (nodelay). A hard dashboard
#             reload fires ~15-25 dynamic requests; static chunks under
#             /_next/static/ are intentionally NOT limited. 429 on exceed.
#   ea_conn — concurrent connections per IP. HTTP/2 multiplexes onto one
#             connection, so 50 is very generous even behind office NAT.
limit_req_zone  $binary_remote_addr zone=ea_req:10m  rate=50r/s;
limit_conn_zone $binary_remote_addr zone=ea_conn:10m;
limit_req_status   429;
limit_conn_status  429;
limit_req_log_level warn;

server {
    listen 80;
    server_name events.meetingmindsgroup.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name events.meetingmindsgroup.com;

    # SSL — managed by Certbot
    ssl_certificate     /etc/letsencrypt/live/events.meetingmindsgroup.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/events.meetingmindsgroup.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options        "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # Cap concurrent connections per client IP (catches connection-exhaustion
    # floods; generous enough that HTTP/2 multiplexing + office NAT never trip it).
    limit_conn ea_conn 50;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml;

    # Next.js static assets — long cache
    location /_next/static/ {
        proxy_pass http://ea_sys_app;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location /_next/image {
        proxy_pass http://ea_sys_app;
    }

    # MCP endpoint — disable gzip + buffering for SSE streaming.
    # Also matches /api/mcp/oauth/* (token/register/revoke/authorize-decision)
    # and inherits the same SSE-friendly proxy config, which is harmless for
    # plain JSON responses.
    location /api/mcp {
        # limit_req counts a request once at arrival, so long-lived SSE streams
        # are unaffected; this caps the rate of NEW MCP requests per IP.
        limit_req zone=ea_req burst=50 nodelay;

        proxy_pass         http://ea_sys_app;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_set_header   Connection        "";

        # Critical for MCP/SSE — disable all buffering and compression
        gzip               off;
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        chunked_transfer_encoding on;
    }

    # Agent SSE endpoint — same treatment
    location ~ /api/events/.*/agent/execute {
        limit_req zone=ea_req burst=50 nodelay;

        proxy_pass         http://ea_sys_app;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        gzip               off;
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Main app
    location / {
        # Per-IP request rate cap. Static chunks under /_next/static/ have their
        # own (un-limited) location, so a page load's asset burst isn't counted
        # here — only HTML/RSC/API requests are. burst=100 covers any real load.
        limit_req zone=ea_req burst=100 nodelay;

        proxy_pass         http://ea_sys_app;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        proxy_buffer_size  16k;
        proxy_buffers      4 32k;
    }

    location ~ /\. { deny all; }
    client_max_body_size 10M;
}

