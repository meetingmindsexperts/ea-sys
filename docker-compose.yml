services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    container_name: ea-sys-app
    working_dir: /app
    volumes:
      - ./:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    networks:
      - ea-network
    environment:
      NODE_ENV: development
      DATABASE_URL: ${DATABASE_URL}
      DIRECT_URL: ${DIRECT_URL}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
    depends_on:
      - mailhog

  # Uncomment to use local PostgreSQL instead of Supabase
  # postgres:
  #   image: postgres:16-alpine
  #   container_name: ea-sys-db
  #   ports:
  #     - "5432:5432"
  #   environment:
  #     POSTGRES_USER: postgres
  #     POSTGRES_PASSWORD: postgres
  #     POSTGRES_DB: easys
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   networks:
  #     - ea-network

  # Tenant-isolation harness DB (multi-tenancy Phase 0): real Postgres +
  # pgbouncer in TRANSACTION pool mode, mirroring the Supabase prod topology.
  # Start with `docker compose --profile tenancy up -d`, then set
  # TENANCY_DIRECT_URL / TENANCY_DATABASE_URL (see .env.example) and run
  # `npm run test:tenancy`. Off by default (profile-gated).
  tenancy-postgres:
    image: postgres:16-alpine
    container_name: ea-sys-tenancy-db
    profiles: ["tenancy"]
    ports:
      - "55432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tenancy
    networks:
      - ea-network

  tenancy-pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: ea-sys-tenancy-pgbouncer
    profiles: ["tenancy"]
    ports:
      - "56432:5432"
    environment:
      DB_HOST: tenancy-postgres
      DB_NAME: tenancy
      DB_USER: app_user
      DB_PASSWORD: app_user_pw
      POOL_MODE: transaction
      AUTH_TYPE: plain
      MAX_CLIENT_CONN: "100"
    depends_on:
      - tenancy-postgres
    networks:
      - ea-network

  # Uncomment for Redis (caching, queues)
  # redis:
  #   image: redis:7-alpine
  #   container_name: ea-sys-redis
  #   ports:
  #     - "6379:6379"
  #   volumes:
  #     - redis_data:/data
  #   networks:
  #     - ea-network

  # RTMP → HLS live streaming server
  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: ea-sys-mediamtx
    restart: unless-stopped
    ports:
      - "1935:1935"    # RTMP ingest (Zoom pushes here)
      - "8888:8888"    # HLS output (player reads here)
      - "8889:8889"    # WebRTC (future low-latency option)
    volumes:
      - ./mediamtx.yml:/mediamtx.yml
    networks:
      - ea-network

  mailhog:
    image: mailhog/mailhog
    container_name: ea-sys-mail
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - ea-network

volumes:
  postgres_data:
  redis_data:

networks:
  ea-network:
    driver: bridge
